<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Lesiba</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
    margin: 0;
    padding: 0;
    background-color: #000;
    font-family: 'Press Start 2P', cursive;
    overflow: hidden;
    height: 100vh;
    border: 10px solid #00ffcc;
    box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc inset;
}

/* Centered birthday text */
.center-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 32px;
    color: #ff0000;
    text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000, 0 0 20px #ff0000;
    animation: neonColors 5s infinite;
}

/* Neon animation */
@keyframes neonColors {
    0% { color: #ff0000; text-shadow: 0 0 5px #ff0000,0 0 10px #ff0000,0 0 20px #ff0000; }
    25% { color: #ffcc00; text-shadow: 0 0 5px #ffcc00,0 0 10px #ffcc00,0 0 20px #ffcc00; }
    50% { color: #00ffcc; text-shadow: 0 0 5px #00ffcc,0 0 10px #00ffcc,0 0 20px #00ffcc; }
    75% { color: #ff00ff; text-shadow: 0 0 5px #ff00ff,0 0 10px #ff00ff,0 0 20px #ff00ff; }
    100% { color: #ff0000; text-shadow: 0 0 5px #ff0000,0 0 10px #ff0000,0 0 20px #ff0000; }
}

/* Pixel button */
.gift-button {
    margin-top: 20px;
    padding: 16px 24px;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    color: #fff;
    background: #ff00ff;
    border: 4px solid #fff;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.3s;
}

.gift-button:hover {
    background: #00ffff;
    color: #000;
}
</style>
</head>
<body>

<div class="center-text">
    🎮Happy Birthday Lesiba🏆
    <br><br>
    <button class="gift-button" onclick="openGift()">Click to open gift</button>
</div>

<script>
function openGift() {
    window.open("https://YOUR-USERNAME.github.io/YOUR-REPO/Lesiba%2032%20Birthday.pdf", "_blank");
}
</script>

</body>
</html>
