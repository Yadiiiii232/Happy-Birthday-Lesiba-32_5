<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Lesiba</title>

<!-- Pixel font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: 'Press Start 2P', cursive;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    border: 8px solid #00ffcc;
    box-shadow: 0 0 20px #00ffcc, inset 0 0 20px #00ffcc;
}

/* Center container */
.container {
    text-align: center;
}

/* Glowing animated text */
.title {
    font-size: 28px;
    animation: glow 4s infinite;
}

/* Glow colors */
@keyframes glow {
    0%   { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
    25%  { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
    50%  { color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    75%  { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
    100% { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
}

/* Pixel button */
button {
    margin-top: 30px;
    padding: 15px 25px;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    background: #ff00ff;
    color: white;
    border: 4px solid white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ffff;
    color: black;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">🎮Happy Birthday Lesiba🏆</div>
    <a href="Lesiba 32 Birthday.pdf" target="_blank" class="pdf-button">Click to open Gift</a>
}
</script>

</body>
</html>
